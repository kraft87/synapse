name: CI

on:
  push:
    branches: [main, "claude/**", "feat/**"]
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false  # uv tool run doesn't use the project venv
      - name: Lint
        run: uv tool run ruff@0.15.15 check .
      - name: Format check
        run: uv tool run ruff@0.15.15 format --check .

  mypy:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: "true"
          enable-cache: false  # use the persistent local UV_CACHE_DIR instead
      # mypy's incremental store is the persistent MYPY_CACHE_DIR volume now
      # (no actions/cache round-trip to GitHub's cache service).
      - name: Install dependencies
        run: uv sync --frozen
      - name: Mypy
        run: uv run mypy ingestion/ mcp_server/__init__.py mcp_server/recall.py --ignore-missing-imports

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: "true"
          enable-cache: false  # installs bandit only, not the project venv
      - name: Install bandit
        run: uv pip install bandit
      - name: Bandit
        run: bandit -r ingestion/ -ll -ii

  web:
    name: Web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # tsc --noEmit + esbuild (web/package.json's "build"). A broken bundle fails
      # here and, via the push job's needs, can never ship in an image.
      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

  test:
    name: Pytest
    runs-on: ubuntu-latest
    # A ParadeDB service container gives each run its own Postgres. `services:` publish to
    # the job's localhost, so it's reachable at 127.0.0.1:5432. A per-run ephemeral database
    # still gives isolation; the whole service is torn down with the job.
    services:
      paradedb:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U synapse -d synapse"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    env:
      PGHOST: localhost
      PGUSER: synapse
      PGPASSWORD: synapse
      CI_DB: ci_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: "true"
          enable-cache: false  # use the persistent local UV_CACHE_DIR instead
      - name: Install psql client
        run: command -v psql >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client)
      # Schema comes from scripts/apply_schema.sh — the same script the shipped
      # first-boot init hook runs — so the tested list and the shipped list
      # can't drift.
      - name: Provision ephemeral test DB on the ParadeDB service container + apply schema
        run: |
          uv sync --frozen &
          UV_PID=$!
          psql -h "$PGHOST" -U "$PGUSER" -d postgres -c "DROP DATABASE IF EXISTS \"$CI_DB\" WITH (FORCE)"
          psql -h "$PGHOST" -U "$PGUSER" -d postgres -c "CREATE DATABASE \"$CI_DB\""
          scripts/apply_schema.sh "postgresql://$PGUSER:$PGPASSWORD@$PGHOST:5432/$CI_DB"
          wait $UV_PID
      - name: Run tests (parallel non-DB, serial DB)
        env:
          SYNAPSE_TEST_URL: postgresql://synapse:synapse@localhost:5432/ci_${{ github.run_id }}_${{ github.run_attempt }}
          SYNAPSE_DB_URL: postgresql://synapse:synapse@localhost:5432/ci_${{ github.run_id }}_${{ github.run_attempt }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            EXTRA='and not slow'
          else
            EXTRA=''
          fi
          # Non-DB tests fan out across all cores
          uv run pytest tests/ -n auto --dist loadfile --maxfail=5 \
            -m "not db and not integration $EXTRA"
          # DB tests run serially to avoid TRUNCATE/INSERT races on the shared schema
          uv run pytest tests/ -p no:xdist --maxfail=5 \
            -m "db and not integration $EXTRA"
      - name: Drop ephemeral test DB
        if: always()
        run: psql -h "$PGHOST" -U "$PGUSER" -d postgres -c "DROP DATABASE IF EXISTS \"$CI_DB\" WITH (FORCE)" || true

  # Build the images IN PARALLEL with the quality gates (no `needs`), but push:false —
  # this only warms the layer cache. The expensive compile/install work overlaps the
  # ~test-duration gate instead of starting after it. Nothing reaches GHCR here; the
  # deploy job below is the gate that actually pushes, only once every check is green.
  #
  # The image builds self-contained (the Dockerfile needs no external base), with a
  # GHA layer cache so warm builds reuse the apt/uv/CLI layers. Fresh clones build
  # the same way with `docker compose up -d --build`.
  build:
    name: Build images
    if: github.repository == 'kraft87/synapse' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build synapse (cache warm, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=synapse
          cache-to: type=gha,mode=max,scope=synapse
          provenance: false

  push:
    name: Push image
    # Publishes the app image to GHCR on every green main build. Deployment is
    # pull-based: hosts running this stack watch ghcr.io/<repo>:latest and update
    # themselves (e.g. Watchtower), so CI never reaches into any host.
    needs: [ruff, mypy, bandit, web, test, build]
    # Repository guard: forks have no GHCR push rights under this owner.
    if: github.repository == 'kraft87/synapse' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # The build job already produced every layer; cache-from resolves them, so
      # this step is push-only in practice.
      - name: Push synapse
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=synapse
          provenance: false
