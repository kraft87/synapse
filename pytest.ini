[pytest]
asyncio_mode = auto
env_files = .env
testpaths = tests
addopts = -p no:logfire --strict-markers
markers =
    integration: requires live external services (FalkorDB, etc); skipped on default CI runs
    slow: takes >5s; can be skipped on PR runs via `-m "not slow"`
    db: touches the shared Postgres test DB; grouped onto one xdist worker via collection hook
